<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"><link rel="stylesheet" href="../colors_and_type.css"><style>html,body{margin:0}.wrap{width:700px;box-sizing:border-box;padding:24px;background:var(--paper-warm)}.lbl{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--ink-500);margin:0 0 16px}.row{display:flex;gap:24px;align-items:center;flex-wrap:wrap}</style></head><body><div class="wrap"><p class="lbl">Brand illustration · framed hero figures</p>
<div class="row" style="gap:16px;align-items:stretch">
  <figure style="margin:0;flex:1;border:1px solid var(--ink-200);border-radius:16px;overflow:hidden;background:var(--paper-tint)"><img src="../assets/nessie-silhouette.svg" alt="Nessie" style="display:block;width:100%;height:150px;object-fit:cover"><figcaption style="border-top:1px solid var(--ink-100);background:var(--paper);padding:7px 12px;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--ink-500)">Loch Ness, 1934</figcaption></figure>
  <figure style="margin:0;flex:1;border:1px solid var(--ink-200);border-radius:16px;overflow:hidden;background:var(--paper-tint)"><img src="../assets/solarpunk-vision.svg" alt="Solarpunk" style="display:block;width:100%;height:150px;object-fit:cover"><figcaption style="border-top:1px solid var(--ink-100);background:var(--paper);padding:7px 12px;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--ink-500)">Forest City, one future</figcaption></figure>
</div></div></body></html>
